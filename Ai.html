    <style>
        :root { 
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 20px);
            --bg: #f8fafc;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0,0,0,0.06);
            --card: #ffffff;
            --input: #f1f5f9;
            --orb-opacity: 0.6;
        }

        .dark {
            --bg: #050505;
            --text: #f8fafc;
            --text-muted: #9ca3af;
            --border: rgba(255,255,255,0.08);
            --card: #0a0a0c;
            --input: rgba(255,255,255,0.04);
            --orb-opacity: 0.3;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            overflow-y: auto;
        }

        h1, h2, h3, h4, .font-display { font-family: 'Plus Jakarta Sans', 'Noto Sans HK', sans-serif; font-weight: 800; letter-spacing: -0.02em; }
        .font-literary { font-family: 'LXGW WenKai TC', serif; }

        .ambient-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; background-color: var(--bg); transition: background-color 0.5s; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: var(--orb-opacity); will-change: transform; animation: fluidOrb 25s infinite linear; }
        .orb-1 { width: 70vw; height: 70vw; background: radial-gradient(circle, #6366f1, transparent 60%); top: -20%; left: -10%; }
        .orb-2 { width: 60vw; height: 60vw; background: radial-gradient(circle, #db2777, transparent 60%); bottom: -10%; right: -20%; animation-duration: 30s; animation-direction: reverse; }
        .orb-3 { width: 50vw; height: 50vw; background: radial-gradient(circle, #0ea5e9, transparent 60%); top: 40%; left: 40%; animation-duration: 40s; }
        @keyframes fluidOrb {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(10vw, 15vh) rotate(120deg) scale(1.1); }
            66% { transform: translate(-15vw, 5vh) rotate(240deg) scale(0.9); }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); }
        }

        .glass-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 1.618rem; 
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .glass-card:hover {
            transform: translateY(-0.382rem);
            box-shadow: 0 20px 60px -10px rgba(99, 102, 241, 0.15);
        }
        .dark .glass-card { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5); }

        .task-card-anim {
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .task-card-anim::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 100% 0%, var(--subj-color-soft, transparent), transparent 70%);
            opacity: 0.4;
            z-index: -1;
            transition: opacity 0.5s ease;
            animation: breatheGlow 5s alternate infinite ease-in-out;
            pointer-events: none;
        }
        .task-card-anim:hover::before {
            opacity: 0.8;
            transform: scale(1.1);
        }
        @keyframes breatheGlow {
            0% { opacity: 0.3; transform: scale(1) translate(0, 0); }
            100% { opacity: 0.6; transform: scale(1.05) translate(-2%, 2%); }
        }

        .premium-input { 
            background: var(--input); 
            border: 1px solid transparent; 
            color: var(--text); 
            padding: 1rem 1.618rem; 
            border-radius: 1rem; 
            width: 100%; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .dark .premium-input { box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .premium-input:focus { 
            outline: none; 
            border-color: #6366f1; 
            background: var(--card); 
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); 
            transform: translateY(-0.25rem);
        }

        .top-nav-item { 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 0.618rem;
        }
        .top-nav-item:hover:not(.active) { 
            color: var(--text); 
            background: var(--border); 
            transform: scale(1.05);
        }

        .view-section { display: none; opacity: 0; }
        .view-section.active { display: block; opacity: 1; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="color"] { -webkit-appearance: none; border: none; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 0.618rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        button {
            position: relative;
            overflow: hidden;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

        // ============ Firebase 初始化 ============
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDocs, getDoc, query, where, onSnapshot, writeBatch, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByPLZqByFtsFbCXBaIz53psLcdKoXBouY",
            authDomain: "newhw-daf31.firebaseapp.com",
            projectId: "newhw-daf31",
            storageBucket: "newhw-daf31.firebasestorage.app",
            messagingSenderId: "128108976196",
            appId: "1:128108976196:web:165632fd92d0f1e4af8411",
            measurementId: "G-ENT0Y6RRPE"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const storage = getStorage(firebaseApp);
        const analytics = getAnalytics(firebaseApp);

        // ============ 全域配置 ============
        const internalAppId = 'lumina-task-v1';
        
        // ============ 狀態管理 ============
        const state = {
            user: null,
            profile: {},
            tasks: [],
            groups: [],
            notifications: [],
            subjects: [],
            timetableConfig: {},
            customDays: ['星期一', '星期二', '星期三', '星期四', '星期五'],
            currentView: 'home',
            currentDayTab: '星期一',
            classTimerInterval: null,
            unsubscribers: [],
            tempImageBase64: null,
            filters: { subject: 'all', incompleteOnly: false, sortDesc: false }
        };

        // ============ 工具函數 ============
        const safeStr = (str) => encodeURIComponent(str || '');
        
        const escapeHTML = (str) => {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        const API = {
            paths: {
                userProfile: () => `users/${state.user?.uid}/profile`,
                tasks: () => `users/${state.user?.uid}/tasks`,
                assignments: () => `users/${state.user?.uid}/assignments`,
                notifs: () => `users/${state.user?.uid}/notifications`,
                groups: () => `groups`,
                subjects: () => `users/${state.user?.uid}/subjects`
            },
            genId: () => Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15),
            getWorkingDay: () => { 
                let d = new Date();
                do { 
                    d.setDate(d.getDate() + 1); 
                } while (d.getDay() === 0 || d.getDay() === 6);
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            },
            formatDateLabel: (dateStr) => {
                if(!dateStr) return '無期限'; 
                const targetDate = new Date(dateStr);
                const today = new Date();
                
                today.setHours(0, 0, 0, 0);
                targetDate.setHours(0, 0, 0, 0);
                
                const days = ['日','一','二','三','四','五','六'];
                const timeDiff = targetDate.getTime() - today.getTime();
                const diffDays = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
                
                let diffStr = '';
                if(diffDays < 0) diffStr = '已逾期';
                else if(diffDays === 0) diffStr = '今天到期';
                else if(diffDays === 1) diffStr = '明天到期';
                else diffStr = `${diffDays} 天後`;
                
                return {
                    full: `${targetDate.getFullYear()}-${(targetDate.getMonth()+1).toString().padStart(2,'0')}-${targetDate.getDate().toString().padStart(2,'0')} (星期${days[targetDate.getDay()]})`,
                    diff: diffStr,
                    isOverdue: diffDays < 0
                };
            }
        };

        // ============ UI 管理 ============
        const UI = {
            notify: (msg, type='success') => {
                if(navigator.vibrate) navigator.vibrate(type==='success'?[50]:[50, 50, 50]);
                
                const toastEl = document.createElement('div');
                const bgColor = type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-red-500' : type === 'warning' ? 'bg-yellow-500' : 'bg-blue-500';
                toastEl.className = `fixed bottom-8 left-6 right-6 md:left-auto md:right-6 md:max-w-sm ${bgColor} text-white px-6 py-4 rounded-xl font-bold text-sm shadow-lg z-[500] animate-in fade-in slide-in-from-bottom-4 duration-300`;
                toastEl.innerHTML = `<div class="flex items-center gap-3"><i class="fa-solid ${type==='success'?'fa-check':type==='error'?'fa-xmark':type==='warning'?'fa-exclamation':'fa-info'} text-lg"></i><span>${escapeHTML(msg)}</span></div>`;
                document.body.appendChild(toastEl);
                
                if(typeof gsap !== 'undefined') {
                    gsap.to(toastEl, { opacity: 0, duration: 0.5, delay: 3, onComplete: () => toastEl.remove() });
                } else {
                    setTimeout(() => toastEl.remove(), 3500);
                }
            },
            overlay: {
                show: () => {
                    const overlay = document.getElementById('global-overlay');
                    overlay.classList.remove('hidden');
                    if(typeof gsap !== 'undefined') gsap.to(overlay, { opacity: 1, duration: 0.3 });
                    else overlay.style.opacity = '1';
                },
                hide: () => {
                    const overlay = document.getElementById('global-overlay');
                    if(typeof gsap !== 'undefined') {
                        gsap.to(overlay, { opacity: 0, duration: 0.3, onComplete: () => overlay.classList.add('hidden') });
                    } else {
                        overlay.classList.add('hidden');
                    }
                }
            },
            modal: {
                open: (html) => {
                    UI.overlay.show();
                    const modal = document.getElementById('center-modal');
                    const content = document.getElementById('center-modal-content');
                    content.innerHTML = html;
                    modal.classList.remove('hidden');
                    if(typeof gsap !== 'undefined') {
                        gsap.fromTo(content, { scale: 0.95, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(1.5)" });
                    } else {
                        content.style.opacity = '1';
                        content.style.transform = 'scale(1)';
                    }
                },
                close: () => {
                    const modal = document.getElementById('center-modal');
                    const content = document.getElementById('center-modal-content');
                    if(typeof gsap !== 'undefined') {
                        gsap.to(content, { scale: 0.95, opacity: 0, duration: 0.3, onComplete: () => {
                            modal.classList.add('hidden');
                            UI.overlay.hide();
                        }});
                    } else {
                        modal.classList.add('hidden');
                        UI.overlay.hide();
                    }
                }
            },
            sheet: {
                open: (html) => {
                    UI.overlay.show();
                    const sheet = document.getElementById('bottom-sheet');
                    const body = document.getElementById('bottom-sheet-body');
                    body.innerHTML = html;
                    sheet.classList.remove('hidden');
                    if(typeof gsap !== 'undefined') {
                        gsap.to(document.getElementById('bottom-sheet-content'), { y: 0, duration: 0.5, ease: "power3.out" });
                    } else {
                        document.getElementById('bottom-sheet-content').style.transform = 'translateY(0)';
                    }
                },
                close: () => {
                    const sheet = document.getElementById('bottom-sheet');
                    const content = document.getElementById('bottom-sheet-content');
                    if(typeof gsap !== 'undefined') {
                        gsap.to(content, { y: '100%', duration: 0.4, ease: "power3.in", onComplete: () => {
                            sheet.classList.add('hidden');
                            UI.overlay.hide();
                        }});
                    } else {
                        sheet.classList.add('hidden');
                        UI.overlay.hide();
                    }
                }
            }
        };

        // ============ 應用程式核心 ============
        const app = {
            init: () => {
                const loader = document.getElementById('system-loader');
                
                const hideLoader = () => {
                    if (loader.style.display === 'none') return;
                    if (typeof gsap !== 'undefined') {
                        gsap.to(loader, { opacity: 0, duration: 0.5, onComplete: () => { 
                            loader.style.display = 'none'; 
                        }});
                    } else { 
                        loader.style.display = 'none'; 
                    }
                };

                try {
                    try { app.settings.initTheme(); } catch(e){}
                    
                    // 監聽認證狀態
                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            state.user = user;
                            state.profile = { uid: user.uid, email: user.email, displayName: user.displayName, photoURL: user.photoURL };
                            
                            document.getElementById('view-auth').classList.add('hidden');
                            document.getElementById('app-core').classList.remove('hidden');
                            
                            // 更新頭部日期
                            const now = new Date();
                            const days = ['日','一','二','三','四','五','六'];
                            document.getElementById('header-date').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (星期${days[now.getDay()]})`;
                            
                            // 設置頭部頭像
                            if (user.photoURL) {
                                document.getElementById('header-avatar').src = user.photoURL;
                                document.getElementById('header-avatar').classList.remove('hidden');
                                document.getElementById('header-avatar-fallback').classList.add('hidden');
                            }
                            
                            // 初始化數據監聽
                            app.data.initListeners();
                            app.updateWidgets();
                            
                            hideLoader();
                            UI.notify('登入成功！', 'success');
                        } else {
                            state.user = null;
                            document.getElementById('app-core').classList.add('hidden');
                            document.getElementById('view-auth').classList.remove('hidden');
                            hideLoader();
                        }
                    });
                } catch(e) {
                    console.error("Init Error:", e);
                    hideLoader();
                    UI.notify('系統初始化失敗', 'error');
                }
            },
            auth: {
                mode: 'login',
                toggleMode: () => {
                    const nameInput = document.getElementById('auth-name');
                    const mainBtn = document.getElementById('auth-main-btn');
                    const toggleBtn = document.getElementById('auth-toggle-btn');
                    if (app.auth.mode === 'login') {
                        app.auth.mode = 'register';
                        nameInput.classList.remove('hidden');
                        mainBtn.textContent = '註冊並登入 Sign Up';
                        toggleBtn.textContent = '已有帳號？點此登入';
                    } else {
                        app.auth.mode = 'login';
                        nameInput.classList.add('hidden');
                        mainBtn.textContent = '登入 Login';
                        toggleBtn.textContent = '還沒有帳號？點此註冊';
                    }
                },
                submit: () => {
                    if (app.auth.mode === 'login') app.auth.loginWithEmail();
                    else app.auth.registerWithEmail();
                },
                loginWithGoogle: async () => { 
                    try {
                        const provider = new GoogleAuthProvider();
                        await signInWithPopup(auth, provider);
                    } catch (error) {
                        UI.notify(`Google 登入失敗: ${error.message}`, 'error');
                    }
                },
                loginWithEmail: async () => { 
                    const e = document.getElementById('auth-email').value.trim(); 
                    const p = document.getElementById('auth-password').value; 
                    if(!e||!p) return UI.notify('請輸入完整', 'error'); 
                    
                    try {
                        await signInWithEmailAndPassword(auth, e, p);
                    } catch (error) {
                        UI.notify(`登入失敗: ${error.message}`, 'error');
                    }
                },
                registerWithEmail: async () => { 
                    const n = document.getElementById('auth-name').value.trim();
                    const e = document.getElementById('auth-email').value.trim();
                    const p = document.getElementById('auth-password').value; 
                    if(!n || !e || !p) return UI.notify('請填寫完整資訊 (包含姓名)', 'error'); 
                    if(p.length<6) return UI.notify('密碼至少6位', 'error'); 
                    
                    try {
                        const userCredential = await createUserWithEmailAndPassword(auth, e, p);
                        await setDoc(doc(db, API.paths.userProfile()), {
                            uid: userCredential.user.uid,
                            email: e,
                            displayName: n,
                            role: 'student',
                            createdAt: new Date().toISOString()
                        });
                        UI.notify('註冊成功！', 'success');
                    } catch (error) {
                        UI.notify(`註冊失敗: ${error.message}`, 'error');
                    }
                },
                logout: async () => { 
                    try {
                        clearInterval(state.classTimerInterval); 
                        state.unsubscribers.forEach(unsubscriber => {
                            if (typeof unsubscriber === 'function') {
                                try { unsubscriber(); } catch(e) { console.warn('Unsubscriber error:', e); }
                            }
                        });
                        state.unsubscribers = [];
                        await signOut(auth);
                        UI.notify('已安全登出', 'success');
                    } catch (error) {
                        UI.notify(`登出失敗: ${error.message}`, 'error');
                    }
                }
            },
            profile: {
                toggle: () => {
                    const rb = state.profile.role === 'provider' ? `<span class="bg-pink-500/20 text-pink-500 text-[10px] px-2 py-1 rounded-md font-bold ml-2 border border-pink-500/30">Provider</span>` : `<span class="bg-brand-500/20 text-brand-500 text-[10px] px-2 py-1 rounded-md font-bold ml-2 border border-brand-500/30">Student</span>`;
                    const src = state.user?.photoURL ? `<img src="${state.user.photoURL}" class="w-24 h-24 rounded-full border-4 border-theme-bg shadow-xl object-cover mx-auto">` : `<div class="w-24 h-24 rounded-full bg-theme-input flex items-center justify-center border-4 border-theme-bg shadow-xl mx-auto"><i class="fa-solid fa-user text-4xl text-theme-muted"></i></div>`;

                    UI.sheet.open(`
                        <div class="relative text-center">
                            <button onclick="app.UI.sheet.close()" class="absolute -top-2 right-0 w-8 h-8 rounded-full bg-theme-input flex items-center justify-center text-theme-muted hover:text-theme-text border border-theme-border active:scale-95 transition-all z-10"><i class="fa-solid fa-xmark"></i></button>
                            
                            <div class="relative inline-block">${src}</div>
                            <h3 class="text-xl font-bold text-theme-text mt-4 flex justify-center items-center font-literary tracking-wide">${escapeHTML(state.user?.displayName || 'Lumina User')} ${rb}</h3>
                            <p class="text-[13px] text-theme-muted font-mono mt-1 mb-8">${escapeHTML(state.user?.email || 'Anonymous')}</p>
                            
                            <div class="space-y-3">
                                <button onclick="app.auth.logout()" class="w-full bg-red-500/10 border border-red-500/20 text-red-500 py-4 rounded-xl text-[15px] font-bold hover:bg-red-500/20 hover:-translate-y-1 active:scale-95 transition-all duration-300 shadow-sm">安全登出 Sign Out</button>
                                <button onclick="app.UI.sheet.close()" class="w-full bg-theme-input border border-theme-border text-theme-text py-4 rounded-xl text-[15px] font-bold hover:bg-theme-border hover:-translate-y-1 active:scale-95 transition-all duration-300 shadow-sm">返回 Return</button>
                            </div>
                        </div>
                    `);
                }
            },
            nav: {
                toggleAdd: () => {
                    const nextView = state.currentView === 'add' ? 'home' : 'add';
                    app.nav.switch(nextView);
                },
                switch: (vid) => { 
                    if (vid === state.currentView) return; 
                    
                    if(vid !== 'add') {
                        document.querySelectorAll('.top-nav-item').forEach(n => {
                            n.classList.remove('active', 'bg-theme-card', 'text-brand-600', 'dark:text-white', 'shadow-sm', 'border-theme-border');
                            n.classList.add('text-theme-muted', 'border-transparent');
                        });
                        const activeNav = document.getElementById(`nav-${vid}`);
                        if(activeNav) {
                            activeNav.classList.remove('text-theme-muted', 'border-transparent');
                            activeNav.classList.add('active', 'bg-theme-card', 'text-brand-600', 'dark:text-white', 'shadow-sm', 'border-theme-border');
                        }
                    }

                    const fabIcon = document.getElementById('add-icon');
                    const fabBtn = document.getElementById('global-fab');
                    if(vid === 'add') { 
                        if(fabIcon) {
                            fabIcon.classList.replace('fa-plus', 'fa-xmark'); 
                            if (typeof gsap !== 'undefined') gsap.to(fabIcon, { rotation: 90, duration: 0.4, ease: "back.out(1.5)" });
                        }
                        if(fabBtn) {
                            fabBtn.classList.add('from-red-600', 'to-red-400', 'shadow-red-500/50');
                            fabBtn.classList.remove('from-brand-600', 'to-pink-500', 'shadow-[0_10px_30px_rgba(99,102,241,0.5)]');
                        }
                    } else { 
                        if(fabIcon) {
                            fabIcon.classList.replace('fa-xmark', 'fa-plus'); 
                            if (typeof gsap !== 'undefined') gsap.to(fabIcon, { rotation: 0, duration: 0.4, ease: "back.out(1.5)" });
                        }
                        if(fabBtn) {
                            fabBtn.classList.remove('from-red-600', 'to-red-400', 'shadow-red-500/50');
                            fabBtn.classList.add('from-brand-600', 'to-pink-500', 'shadow-[0_10px_30px_rgba(99,102,241,0.5)]');
                        }
                    } 

                    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active')); 
                    const t = document.getElementById(`view-${vid}`); 
                    if(t) {
                        t.classList.add('active'); 
                        if (typeof gsap !== 'undefined') gsap.fromTo(t, { opacity: 0, y: 30, scale: 0.98 }, { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "expo.out" }); 
                    }
                    
                    window.scrollTo({top: 0, behavior: 'smooth'});
                    
                    state.currentView = vid; 
                }
            },
            settings: {
                initTheme: () => {
                    const saved = localStorage.getItem('lumina_theme');
                    const root = document.getElementById('html-root');
                    if (saved === 'light') root.classList.remove('dark');
                    else root.classList.add('dark');
                },
                toggleTheme: () => {
                    const root = document.getElementById('html-root');
                    if (root.classList.contains('dark')) {
                        root.classList.remove('dark');
                        localStorage.setItem('lumina_theme', 'light');
                        UI.notify('已切換為淺色模式', 'info');
                    } else {
                        root.classList.add('dark');
                        localStorage.setItem('lumina_theme', 'dark');
                        UI.notify('已切換為深色模式', 'info');
                    }
                }
            },
            renders: {
                notifications: {
                    toggle: () => { 
                        const p = document.getElementById('notif-panel'), b = document.getElementById('notif-badge'); 
                        if(p.classList.contains('hidden')) { 
                            UI.overlay.show(); 
                            p.classList.remove('hidden'); 
                            if(typeof gsap!=='undefined') gsap.fromTo(p, { x: '100%' }, { x: '0%', duration: 0.5, ease: "power3.out" }); 
                            b.classList.add('hidden'); 
                        } else { 
                            if(typeof gsap!=='undefined') gsap.to(p, { x: '100%', duration: 0.4, ease: "power3.in", onComplete: () => { p.classList.add('hidden'); UI.overlay.hide(); }}); 
                            else { p.classList.add('hidden'); UI.overlay.hide(); } 
                        } 
                    }
                }
            },
            data: {
                initListeners: () => {
                    // 監聽任務
                    const tasksRef = collection(db, API.paths.tasks());
                    const unsubTasks = onSnapshot(tasksRef, (snapshot) => {
                        state.tasks = snapshot.docs.map(doc => doc.data());
                        app.updateWidgets();
                    }, (error) => {
                        console.error('任務監聽錯誤:', error);
                    });
                    state.unsubscribers.push(unsubTasks);

                    // 監聽群組
                    const groupsRef = collection(db, API.paths.groups());
                    const unsubGroups = onSnapshot(groupsRef, (snapshot) => {
                        state.groups = snapshot.docs.map(doc => doc.data());
                    }, (error) => {
                        console.error('群組監聽錯誤:', error);
                    });
                    state.unsubscribers.push(unsubGroups);

                    // 監聽通知
                    const notifsRef = collection(db, API.paths.notifs());
                    const unsubNotifs = onSnapshot(notifsRef, (snapshot) => {
                        state.notifications = snapshot.docs.map(doc => doc.data());
                    }, (error) => {
                        console.error('通知監聽錯誤:', error);
                    });
                    state.unsubscribers.push(unsubNotifs);
                }
            },
            updateWidgets: () => {
                const today = new Date().toISOString().split('T')[0]; 
                let t=0, f=0, e=0;
                state.tasks.forEach(task => { 
                    if(task.status === 'completed') return; 
                    if(task.type === 'exam') e++; 
                    else { 
                        if(task.dueDate && task.dueDate <= today) t++; 
                        else f++; 
                    } 
                });
                const elT = document.getElementById('widget-today-count'); 
                if(elT) { 
                    elT.textContent = t; 
                    if(typeof gsap !== 'undefined') gsap.fromTo(elT, {scale: 0.5}, {scale: 1, duration: 0.6, ease: "elastic.out(1.2, 0.4)"}); 
                }
                const elF = document.getElementById('widget-future-count'); 
                if(elF) elF.textContent = f; 
            },
            UI: UI
        };

        window.app = app;

        try {
            window.moduleExecuted = true; 
            if (document.readyState === 'loading') { 
                document.addEventListener('DOMContentLoaded', app.init); 
            } else { 
                app.init(); 
            }
        } catch (error) {
            console.error('Initialization error:', error);
        }
    </script>
</body>
</html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+HK:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        :root { 
            color-scheme: light;
            --bg: #f8fafc;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0,0,0,0.06);
            --card: #ffffff;
            --input: #f1f5f9;
            --orb-opacity: 0.5;
        }

        .dark {
            color-scheme: dark;
            --bg: #0f172a;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --card: #1e293b;
            --input: #334155;
            --orb-opacity: 0.15;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4, .font-display { font-family: 'Plus Jakarta Sans', 'Noto Sans HK', sans-serif; }
        .font-literary { font-family: 'LXGW WenKai TC', serif; }

        /* --- 流體背景特效 --- */
        .ambient-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; background-color: var(--bg); transition: background-color 0.5s; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: var(--orb-opacity); will-change: transform; animation: fluidOrb 30s infinite linear alternate; transition: opacity 0.5s; pointer-events: none; }
        .orb-1 { width: 70vw; height: 70vw; background: radial-gradient(circle, #6366f1, transparent 60%); top: -10%; left: -10%; }
        .orb-2 { width: 60vw; height: 60vw; background: radial-gradient(circle, #db2777, transparent 60%); bottom: -10%; right: -20%; animation-duration: 35s; animation-direction: reverse; }
        .orb-3 { width: 50vw; height: 50vw; background: radial-gradient(circle, #0ea5e9, transparent 60%); top: 40%; left: 40%; animation-duration: 40s; }
        @keyframes fluidOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5vw, 10vh) scale(1.1); }
            100% { transform: translate(-10vw, -5vh) scale(0.9); }
        }

        /* --- 💎 黃金比例毛玻璃卡片 --- */
        .glass-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .dark .glass-card { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        
        /* 🌈 正常卡片模式 (琉璃漸變設計) */
        .task-card-anim { 
            position: relative; overflow: hidden; z-index: 1; border-radius: 24px; 
            background: linear-gradient(135deg, rgba(var(--subj-color-rgb, 99, 102, 241), 0.06) 0%, rgba(var(--subj-color-rgb, 99, 102, 241), 0.01) 100%);
            background-color: var(--card); 
            border: 1px solid rgba(var(--subj-color-rgb, 99, 102, 241), 0.12); 
            border-left: 6px solid var(--subj-color-soft, #6366f1);
            box-shadow: 0 6px 24px -6px rgba(0,0,0,0.03);
        }
        .dark .task-card-anim { 
            background: linear-gradient(135deg, rgba(var(--subj-color-rgb, 99, 102, 241), 0.12) 0%, rgba(var(--subj-color-rgb, 99, 102, 241), 0.02) 100%);
            background-color: var(--card);
            border-color: rgba(var(--subj-color-rgb, 99, 102, 241), 0.2); 
            border-left: 6px solid var(--subj-color-soft, #6366f1);
            box-shadow: 0 6px 24px -6px rgba(0,0,0,0.3);
        }
        .task-card-anim::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 100% 0%, var(--subj-color-soft, transparent), transparent 60%);
            opacity: 0.06; z-index: -1; transition: opacity 0.4s ease, transform 0.4s ease; pointer-events: none;
        }
        .task-card-anim:hover::before { opacity: 0.12; transform: scale(1.05); }

        /* 🌈 資訊屏任務卡片 (高鐵站式極簡漸變) */
        .task-card-anim-board { 
            position: relative; overflow: hidden; z-index: 1; border-radius: 16px; 
            background: linear-gradient(90deg, rgba(var(--subj-color-rgb, 99, 102, 241), 0.05) 0%, transparent 100%);
            background-color: var(--card); 
            border: 1px solid var(--border); 
            border-left: 4px solid var(--urgency-color, #6366f1);
            box-shadow: 0 4px 20px -5px rgba(0,0,0,0.03);
        }
        .dark .task-card-anim-board { 
            background: linear-gradient(90deg, rgba(var(--subj-color-rgb, 99, 102, 241), 0.1) 0%, transparent 100%);
            background-color: var(--card);
            border-color: rgba(255,255,255,0.04); 
            border-left: 4px solid var(--urgency-color, #6366f1);
            box-shadow: 0 4px 20px -5px rgba(0,0,0,0.4);
        }

        /* 🌟 Admin 後台專用樣式 */
        .admin-nav-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .admin-nav-item.active {
            background-color: #6366f1;
            color: #ffffff;
            box-shadow: 0 4px 15px -3px rgba(99, 102, 241, 0.4);
        }
        .admin-nav-item:not(.active):hover {
            background-color: var(--input);
            color: var(--text);
            transform: translateX(4px);
        }
        .maint-mode-card {
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .maint-mode-card.active-normal { border-color: #10b981; background-color: rgba(16, 185, 129, 0.05); }
        .maint-mode-card.active-update { border-color: #6366f1; background-color: rgba(99, 102, 241, 0.05); }
        .maint-mode-card.active-reset  { border-color: #f59e0b; background-color: rgba(245, 158, 11, 0.05); }
        .maint-mode-card:hover:not([class*="active-"]) { border-color: var(--border); background-color: var(--input); }

        /* Toggle Switch CSS (Apple Style) */
        .toggle-checkbox:checked { right: 0; border-color: #6366f1; }
        .toggle-checkbox:checked + .toggle-label { background-color: #6366f1; }

        /* 🌟 防誤觸的任務完成按鈕 */
        .task-check-btn {
            border-color: rgba(100, 116, 139, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark .task-check-btn { border-color: rgba(148, 163, 184, 0.4); }
        .task-check-btn:hover { border-color: #6366f1; background-color: #6366f1; }
        .task-check-btn:hover i { opacity: 1; transform: scale(1); }
        .task-check-btn i { opacity: 0; transform: scale(0.5); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* 🌟 拖曳排序專用樣式與效能修復 */
        .drag-handle { touch-action: none; cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost-class { opacity: 0.3; background: var(--input); border: 2px dashed #6366f1; border-radius: 16px; transform: scale(0.98); }
        .sortable-drag-class { cursor: grabbing !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3); transform: scale(1.03); z-index: 100; background: var(--card); }

        /* --- 精緻輸入框 --- */
        .premium-input { 
            background: var(--input); border: 1px solid transparent; color: var(--text); 
            padding: 1rem 1.25rem; border-radius: 16px; width: 100%; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .dark .premium-input { box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.02); }
        .premium-input:focus { outline: none; border-color: #6366f1; background: var(--card); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); transform: translateY(-2px); }

        /* --- 跑馬燈重構 --- */
        .marquee-container { overflow: hidden; white-space: nowrap; flex: 1; display: flex; align-items: center; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee-scroll 20s linear infinite; }
        @keyframes marquee-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- 🌟 單行精緻導航列 (全域置中島嶼) --- */
        .nav-item { cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .bottom-nav-item { 
            flex: 1; display: flex; flex-direction: row; align-items: center; justify-content: center; 
            gap: 8px; padding: 12px 16px; border-radius: 100px; color: var(--text-muted); 
            white-space: nowrap;
        }
        .bottom-nav-item i { font-size: 18px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bottom-nav-item span { font-size: 14px; font-weight: 800; display: none; }
        
        .bottom-nav-item.active { 
            color: #fff; background: #6366f1; 
            box-shadow: 0 8px 20px -5px rgba(99,102,241,0.5); 
            flex: 1.8;
        }
        .bottom-nav-item.active span { display: inline-block; animation: fadeInRight 0.2s ease forwards; }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
        
        .bottom-nav-item:hover:not(.active) { color: var(--text); background: var(--border); transform: scale(1.05); }

        .view-section { display: none; opacity: 0; min-h: 60vh; animation: fadeIn 0.2s ease forwards; }
        .view-section.active { display: block; opacity: 1; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* 🌟 滑動優化 (磁吸效果) */
        .snap-container { scroll-snap-type: x mandatory; scroll-padding: 1rem; -webkit-overflow-scrolling: touch; }
        .snap-item { scroll-snap-align: center; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="color"] { -webkit-appearance: none; border: none; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* 🌟 CSS 狀態控制動畫 */
        #main-header { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body.is-scrolled #main-header { padding-top: 0.75rem; padding-bottom: 0.75rem; background-color: rgba(255,255,255,0.85); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .dark body.is-scrolled #main-header { background-color: rgba(30,41,59,0.85); box-shadow: 0 10px 30px rgba(0,0,0,0.5); } 
        body.is-scrolled #header-title-text { font-size: 1.5rem; }
        body.is-scrolled .header-avatar-btn { width: 40px; height: 40px; }
    </style>
</head>
<body class="w-full relative font-sans no-scrollbar pb-[env(safe-area-inset-bottom)]">

    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div id="global-marquee-banner" class="hidden fixed top-0 left-0 right-0 w-full bg-gradient-to-r from-red-600 to-orange-500 text-white font-bold text-[13px] px-6 py-2.5 flex items-center gap-4 shadow-[0_4px_20px_rgba(239,68,68,0.4)] z-[100] border-b border-red-400">
        <i class="fa-solid fa-triangle-exclamation animate-pulse text-lg drop-shadow-sm shrink-0"></i>
        <span class="tracking-widest uppercase shrink-0 bg-black/30 px-2 py-0.5 rounded text-[10px] shadow-inner">最高級別公告</span>
        <div class="marquee-container relative w-full h-full">
            <span class="marquee-content font-medium tracking-wide drop-shadow-sm" id="global-marquee-text"></span>
        </div>
    </div>

    <div id="system-loader" class="fixed inset-0 z-[400] flex items-center justify-center bg-theme-bg backdrop-blur-xl transition-opacity duration-500">
        <div class="text-center">
            <div class="w-20 h-20 border-4 border-brand-500/20 border-t-brand-500 rounded-full animate-spin mx-auto mb-6 shadow-[0_0_40px_rgba(99,102,241,0.5)]"></div>
            <div class="text-brand-500 font-mono tracking-widest text-xs uppercase font-bold animate-pulse">Initializing System...</div>
        </div>
    </div>

    <section id="view-auth" class="fixed inset-0 z-[100] flex flex-col items-center justify-center px-6 hidden bg-[#f8fafc]/80 dark:bg-[#0f172a]/80 backdrop-blur-2xl">
        <div class="w-full max-w-sm glass-card p-8 md:p-10 text-center relative overflow-hidden shadow-2xl border border-theme-border">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-brand-500/20 blur-3xl rounded-full pointer-events-none"></div>
            
            <div class="w-20 h-20 bg-gradient-to-tr from-brand-600 to-pink-500 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-[0_15px_40px_rgba(99,102,241,0.5)] transform hover:scale-110 hover:rotate-3 transition-all duration-500">
                <i class="fa-solid fa-book-bookmark text-3xl text-white"></i>
            </div>
            
            <h1 class="text-[28px] font-black text-theme-text mb-2 font-literary tracking-widest">電子手冊</h1>
            <p class="text-xs text-theme-muted mb-10 font-mono tracking-wide">HOMEWORK RECORD SYSTEM</p>

            <button onclick="app.auth.loginWithGoogle()" class="w-full h-[56px] bg-theme-text text-theme-bg rounded-2xl font-bold text-[15px] hover:-translate-y-1 hover:shadow-xl active:scale-95 transition-all duration-300 flex items-center justify-center gap-3 mb-6 min-h-[48px]">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                使用 Google 帳號登入
            </button>

            <div class="flex items-center gap-4 mb-6 opacity-50">
                <div class="h-[1px] flex-1 bg-theme-border"></div>
                <span class="text-[10px] text-theme-text font-bold tracking-widest uppercase">Or use email</span>
                <div class="h-[1px] flex-1 bg-theme-border"></div>
            </div>

            <div class="space-y-4 mb-8">
                <input type="text" id="auth-name" placeholder="您的姓名 Name" class="premium-input h-[56px] text-[15px] hidden">
                <input type="email" id="auth-email" placeholder="電子郵件 Email" class="premium-input h-[56px] text-[15px]">
                <input type="password" id="auth-password" placeholder="密碼 Password" class="premium-input h-[56px] text-[15px]" onkeydown="if(event.key === 'Enter') app.auth.submit()">
            </div>

            <div class="flex flex-col gap-4">
                <button id="auth-main-btn" onclick="app.auth.submit()" class="w-full h-[56px] bg-brand-600 text-white rounded-2xl font-bold text-[15px] shadow-[0_8px_20px_rgba(99,102,241,0.4)] hover:-translate-y-1 hover:shadow-brand-500/60 active:scale-95 transition-all duration-300 min-h-[48px]">登入 Login</button>
                <button id="auth-toggle-btn" onclick="app.auth.toggleMode()" class="w-full h-[56px] bg-transparent border border-theme-border text-theme-muted rounded-2xl font-bold text-[14px] hover:-translate-y-1 hover:bg-theme-input active:scale-95 transition-all duration-300 min-h-[48px]">還沒有帳號？點此註冊</button>
            </div>
        </div>
    </section>

    <div id="system-blocker" class="fixed inset-0 z-[300] hidden bg-[#f8fafc]/95 dark:bg-[#0f172a]/95 backdrop-blur-2xl flex-col items-center justify-center px-6 text-center transition-opacity duration-500">
        <i id="blocker-icon" class="fa-solid fa-triangle-exclamation text-7xl text-yellow-500 mb-8 animate-pulse drop-shadow-[0_0_20px_rgba(234,179,8,0.5)]"></i>
        <h2 id="blocker-title" class="text-4xl font-black text-theme-text mb-4 tracking-tight font-display">系統維護中</h2>
        <p id="blocker-message" class="text-theme-muted text-[15px] max-w-sm leading-relaxed font-medium">超級管理員正在進行系統升級，請稍後再試。感謝您的耐心等候。</p>
        <button onclick="app.auth.logout()" class="mt-10 px-8 h-[56px] rounded-full border border-theme-border text-[15px] font-bold text-theme-muted hover:bg-theme-input hover:text-theme-text active:scale-95 transition-all shadow-sm min-h-[48px]">安全登出</button>
    </div>

    <div id="app-core" class="hidden flex-col min-h-screen w-full relative">
        
        <header id="main-header" class="fixed top-4 left-4 right-4 md:max-w-5xl lg:max-w-6xl md:mx-auto z-50 bg-white/50 dark:bg-[#1e293b]/50 backdrop-blur-2xl border border-theme-border rounded-[32px] px-6 py-4 flex justify-between items-center shadow-sm transition-all duration-500 transform-gpu">
            <div class="flex flex-col">
                <h1 id="header-title-text" class="text-[26px] md:text-[28px] font-black tracking-wide text-theme-text font-literary drop-shadow-sm leading-tight transition-all duration-300">電子手冊</h1>
                <p id="header-date" class="text-[11px] md:text-[12px] text-brand-500 font-mono tracking-widest font-bold uppercase mt-1 transition-all duration-300 opacity-80">載入中...</p>
            </div>
            <div class="flex items-center gap-2 md:gap-4">
                <div id="offline-badge" class="hidden bg-yellow-500/10 text-yellow-600 dark:text-yellow-400 text-[10px] font-bold px-3 py-1.5 rounded-full border border-yellow-500/20 flex items-center gap-1 shadow-sm"><i class="fa-solid fa-bolt-slash"></i> 離線</div>
                
                <button id="admin-entry-btn" onclick="app.nav.switch('admin')" class="hidden relative w-12 h-12 rounded-[16px] bg-indigo-500/10 text-indigo-500 border border-indigo-500/30 hover:bg-indigo-500 hover:text-white transition-all shadow-sm hover:shadow-[0_0_20px_rgba(99,102,241,0.4)] flex items-center justify-center shrink-0" title="進入超級管理中心">
                    <i class="fa-solid fa-shield-halved text-[20px]"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-indigo-500 rounded-full animate-ping"></span>
                </button>

                <button onclick="app.notifications.toggle()" class="relative w-12 h-12 rounded-[16px] md:rounded-full flex items-center justify-center text-theme-muted hover:text-brand-500 hover:bg-theme-input active:scale-90 transition-all duration-300 min-h-[48px] min-w-[48px] shrink-0">
                    <i class="fa-solid fa-bell text-[22px]"></i>
                    <span id="notif-badge" class="hidden absolute top-2 right-2 w-3.5 h-3.5 bg-pink-500 rounded-full border-[3px] border-theme-bg shadow-sm"></span>
                </button>
                <button onclick="app.profile.toggle()" class="header-avatar-btn w-12 h-12 rounded-[16px] md:rounded-full bg-theme-input flex items-center justify-center overflow-hidden border border-theme-border hover:border-brand-500 shadow-md hover:shadow-brand-500/30 active:scale-90 transition-all duration-300 min-h-[48px] min-w-[48px] shrink-0">
                    <img id="header-avatar" src="" alt="Profile" class="w-full h-full object-cover hidden">
                    <i id="header-avatar-fallback" class="fa-solid fa-user text-theme-muted text-[18px]"></i>
                </button>
            </div>
        </header>
